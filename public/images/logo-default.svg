<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120" fill="none">
  <defs>
    <!-- Top layer blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    
    <!-- Middle cobalt gradient -->
    <linearGradient id="cobaltGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Dark slate/navy base gradient -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Stylized Geometric 'A' Logo Icon -->
  <g transform="translate(15, 10)">
    <!-- Base dark left diagonal stem -->
    <polygon points="0,95 24,95 56,25 32,25" fill="url(#darkGrad)" />
    
    <!-- Middle overlapping blue band -->
    <polygon points="28,55 72,55 84,30 40,30" fill="url(#cobaltGrad)" />
    
    <!-- Top bright blue triangular tip -->
    <polygon points="46,15 90,15 102,0 58,0" fill="url(#blueGrad)" />

    <!-- Right base dark accent leg -->
    <polygon points="44,55 76,95 100,95 68,55" fill="url(#darkGrad)" />
  </g>

  <!-- Typography -->
  <!-- "AuraSlides" text (White for dark theme background) -->
  <text x="145" y="65" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" letter-spacing="-1.5">AuraSlides</text>
  
  <!-- "PREMIUM PRESENTATIONS" text -->
  <text x="148" y="92" font-family="'Inter', -apple-system, sans-serif" font-weight="700" font-size="12.5" fill="#94a3b8" letter-spacing="4.5">PREMIUM PRESENTATIONS</text>
</svg>
